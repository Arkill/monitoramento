<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST - Sistema de Monitoramento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@600;400;700&display=swap" rel="stylesheet">

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="container">
        <section>
            <article>
                <div class="inner">
                    <h1>Bem-vindo</h1>
                    <p>Para manter-se conectado conosco, faça login com suas credenciais</p>
                    <a href="" class="btn">Entrar</a>
                </div>
            </article>
            <aside>
                <div class="inner">
                    <h2>Criar Conta</h2>
                    <nav id="socialLogin">
                        <a href="" class="google">
                            <img src="img/google.svg" alt="Google">
                        </a>
                        <a href="" class="github">
                            <img src="img/facebook.svg" alt="Facebook">
                        </a>
                        <a href="" class="linkedin">
                            <img src="img/linkedin.svg" alt="LinkedIn">
                        </a>                        
                    </nav>
                    <p>ou use seu e-mail para registrar-se</p>
                    <form action="" method="post">
                        <input type="text" placeholder="Nome Completo" required />
                        <input type="email" placeholder="E-mail" required />
                        <input type="password" placeholder="Senha" required />
                        <button type="submit">Registrar</button>
                    </form>
                </div>
            </aside>
        </section>
    </div>
</body>
</html>
